services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: splitlah_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - vendor_data:/var/www/html/vendor
      - node_modules_data:/var/www/html/node_modules
    env_file:
      - .env
    networks:
      - splitlah_net
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php-fpm-healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  nginx:
    image: nginx:alpine
    container_name: splitlah_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-8000}:80"
    volumes:
      - .:/var/www/html:ro
      - ./docker/nginx:/etc/nginx/conf.d:ro
    networks:
      - splitlah_net
    depends_on:
      app:
        condition: service_healthy

  mariadb:
    image: mariadb:11
    container_name: splitlah_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - splitlah_net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Dev-only — do NOT expose phpMyAdmin in production without auth
  phpmyadmin:
    image: phpmyadmin:5.2.2
    container_name: splitlah_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mariadb
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "127.0.0.1:${PMA_PORT:-8080}:80"
    networks:
      - splitlah_net
    depends_on:
      mariadb:
        condition: service_healthy

networks:
  splitlah_net:
    driver: bridge

volumes:
  vendor_data:
  node_modules_data:
  mariadb_data:
